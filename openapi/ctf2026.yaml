openapi: 3.0.0
info:
  version: "1"
  title: CTF2026 API
  description: API for Capture the Flag 2026
  x-apiname: CTF2026
servers:
  - url: https://mainframeyin:8092/CTF2026/API/v1
paths:
  /loginInfo:
    summary: Get login information for current user
    get:
      summary: Get login information for current user
      responses:
        '200':
          description: Successful retrieval of login information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/loginInfo"
        '401':
          description: Unauthorized
        '404':
          description: Not found
        '500':
          description: Internal server error
        default:
          description: Unexpected error
      x-LWWProcessingSteps:
        - AllocateIOArea:
            name: LCTFC100
            initWith: 0x00
            size: 274
            fields:
              $ref: "#/components/x-ioareas/LCTFC100/fields"
        - Link:
            program: CTFC100
            passDataWith: container
            ioArea:
              $ref: "#/paths/~1loginInfo/get/x-LWWProcessingSteps/0/AllocateIOArea"
        - CreateObject:
            name: CTFC100_RESP
            properties:
              $ref: "#/components/schemas/loginInfo/properties"
        - Mapping:
            from:
              $ref: "#/paths/~1loginInfo/get/x-LWWProcessingSteps/0/AllocateIOArea/fields"
            to:
              $ref: "#/paths/~1loginInfo/get/x-LWWProcessingSteps/2/CreateObject/properties"
            combinations:
              - type: singleFields
                fromName: USERID
                toName: userid
              - type: singleFields
                fromName: NICKNAME
                toName: nickname
        - JSONWriter:
            responseObject:
              $ref: "#/paths/~1loginInfo/get/x-LWWProcessingSteps/2/CreateObject"
  /detectives:
    summary: Manage detectives
    post:
      summary: Add new detective
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectivesCRUDLong"
        '401':
          description: Unauthorized
        '404':
          description: Not found
        '500':
          description: Internal server error
        default:
          description: Unexpected error
      x-LWWProcessingSteps:
        - AllocateIOArea:
            name: LCTFM001
            initWith: 0x00
            size: 822
            fields:
              $ref: "#/components/x-ioareas/LCTFM001/fields"
        - ParseRequestJSON:
            name: LCTFC001_POST_JSNR
        - Mapping:
            from:
              $ref: "#/paths/~1detectives/post/x-LWWProcessingSteps/1/ParseRequestJSON"
            to:
              $ref: "#/paths/~1detectives/post/x-LWWProcessingSteps/0/AllocateIOArea/fields"
            combinations:
              - type: singleFields
                fromName: userid
                toName: USERID
              - type: singleFields
                fromName: nickname
                toName: NICKNAME
              - type: singleFields
                fromName: email
                toName: EMAIL
              - type: constant
                constant: C
                toName: OPCODE
              - type: generated
                genEnum: 1
                toName: CREATEDBY
              - type: generated
                genEnum: 2
                toName: CREATEDDATE
              - type: generated
                genEnum: 1
                toName: UPDATEDBY
              - type: generated
                genEnum: 2
                toName: UPDATEDDATE
        - Link:
            program: CTFC001
            passDataWith: container
            ioArea:
              $ref: "#/paths/~1detectives/post/x-LWWProcessingSteps/0/AllocateIOArea"
        - Condition:
            name: LCTFC001_POST_OK
            source:
              $ref: "#/paths/~1detectives/post/x-LWWProcessingSteps/0/AllocateIOArea/fields"
            boolOperator: AND
            expressions:
              - type: fieldEqualsConstant
                fieldName: RETURNCODE
                constant: "00"
            LWWProcessingStepsWhenTrue:
              - CreateObject:
                  name: CTFM001_POST_RET_OK
                  properties:
                    $ref: "#/components/schemas/DetectivesCRUDLong/properties"
              - Mapping:
                  from:
                    $ref: "#/paths/~1detectives/post/x-LWWProcessingSteps/0/AllocateIOArea/fields"
                  to:
                    $ref: "#/paths/~1detectives/post/x-LWWProcessingSteps/4/Condition/LWWProcessingStepsWhenTrue/0/CreateObject/properties"
                  combinations:
                    - type: singleFields
                      fromName: RETURNCODE
                      toName: returnCode
                    - type: singleFields
                      fromName: REASONCODE
                      toName: reasonCode
                    - type: singleFields
                      fromName: INFOMESSAGE
                      toName: infoMessage
                    - type: singleFields
                      fromName: USERID
                      toName: userid
                    - type: singleFields
                      fromName: NICKNAME
                      toName: nickname
                    - type: singleFields
                      fromName: EMAIL
                      toName: email
                    - type: singleFields
                      fromName: CREATEDBY
                      toName: createdBy
                    - type: singleFields
                      fromName: CREATEDDATE
                      toName: createdDate
                    - type: singleFields
                      fromName: UPDATEDBY
                      toName: updatedBy
                    - type: singleFields
                      fromName: UPDATEDDATE
                      toName: updatedDate
              - JSONWriter:
                  responseObject:
                    $ref: "#/paths/~1detectives/post/x-LWWProcessingSteps/4/Condition/LWWProcessingStepsWhenTrue/0/CreateObject"
            LWWProcessingStepsWhenFalse:
              - CreateObject:
                  name: CTFC001_POST_RET_ERR
                  properties:
                    $ref: "#/components/schemas/DetectivesCRUDShort/properties"
              - Mapping:
                  from:
                    $ref: "#/paths/~1detectives/post/x-LWWProcessingSteps/0/AllocateIOArea/fields"
                  to:
                    $ref: "#/paths/~1detectives/post/x-LWWProcessingSteps/4/Condition/LWWProcessingStepsWhenFalse/0/CreateObject/properties"
                  combinations:
                    - type: singleFields
                      fromName: RETURNCODE
                      toName: returnCode
                    - type: singleFields
                      fromName: REASONCODE
                      toName: reasonCode
                    - type: singleFields
                      fromName: INFOMESSAGE
                      toName: infoMessage
              - JSONWriter:
                  responseObject:
                    $ref: "#/paths/~1detectives/post/x-LWWProcessingSteps/4/Condition/LWWProcessingStepsWhenFalse/0/CreateObject"
  /sqlquery:
    summary: Execute an SQL query
    post:
      summary: Execute an SQL query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SQLQueryResponse"
        '401':
          description: Unauthorized
        '404':
          description: Not found
        '500':
          description: Internal server error
        default:
          description: Unexpected error
      x-LWWProcessingSteps:
        - AllocateIOArea:
            name: LCTFM002
            initWith: 0x00
            size: 24266
            fields:
              $ref: "#/components/x-ioareas/LCTFM002/fields"
        - ParseRequestJSON:
            name: LCTFC002_POST_JSNR
        - Mapping:
            from:
              $ref: "#/paths/~1sqlquery/post/x-LWWProcessingSteps/1/ParseRequestJSON"
            to:
              $ref: "#/paths/~1sqlquery/post/x-LWWProcessingSteps/0/AllocateIOArea/fields"
            combinations:
              - type: singleFields
                fromName: sqlquery
                toName: SQLQUERY
        - Link:
            program: CTFC002
            passDataWith: container
            ioArea:
              $ref: "#/paths/~1sqlquery/post/x-LWWProcessingSteps/0/AllocateIOArea"
        - CreateObject:
            name: CTFM002_POST_RET_OK
            properties:
              $ref: "#/components/schemas/SQLQueryResponse/properties"
        - Mapping:
            from:
              $ref: "#/paths/~1sqlquery/post/x-LWWProcessingSteps/0/AllocateIOArea/fields"
            to:
              $ref: "#/paths/~1sqlquery/post/x-LWWProcessingSteps/4/CreateObject/properties"
            combinations:
              - type: singleFields
                fromName: SQLCODE-C
                toName: sqlcode
              - type: groupToArray
                fromGroupName: SQLRESULTS
                toArrayName: sqlResults
                itemMappings:
                  - type: singleFields
                    fromName: SQLRESLINE
                    toName: resultLine
        - JSONWriter:
            responseObject:
              $ref: "#/paths/~1sqlquery/post/x-LWWProcessingSteps/4/CreateObject"
  /token:
    summary: Retrieve access token
    post:
      summary: Retrieve access token
      operationId: newAccessToken
      tags:
        - insert
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
        default:
          description: Unexpected error
      x-LWWProcessingSteps:
        - AllocateIOArea:
            name: LWWADPLI
            initWith: 0x00
            size: 1136
            fields:
              $ref: "#/components/x-ioareas/LWWADPLI/fields"
        - ParseRequestJSON:
            name: LWWADPLI_JSNR
        - Mapping:
            from:
              $ref: "#/paths/~1token/post/x-LWWProcessingSteps/1/ParseRequestJSON"
            to:
              $ref: "#/paths/~1token/post/x-LWWProcessingSteps/0/AllocateIOArea/fields"
            combinations:
              - type: singleFields
                fromName: username
                toName: USERNAME
              - type: singleFields
                fromName: password
                toName: PASSWORD
        - Link:
            program: LWWADPLI
            passDataWith: container
            ioArea:
              $ref: "#/paths/~1token/post/x-LWWProcessingSteps/0/AllocateIOArea"
        - CreateObject:
            name: LWWADPLI_RET
            properties:
              $ref: "#/components/schemas/TokenResponse/properties"
        - Mapping:
            from:
              $ref: "#/paths/~1token/post/x-LWWProcessingSteps/0/AllocateIOArea/fields"
            to:
              $ref: "#/paths/~1token/post/x-LWWProcessingSteps/4/CreateObject/properties"
            combinations:
              - type: singleFields
                fromName: TOKEN
                toName: token
        - JSONWriter:
            responseObject:
              $ref: "#/paths/~1token/post/x-LWWProcessingSteps/4/CreateObject"
components:
  schemas:
    loginInfo:
      type: object
      properties:
        userid:
          type: string
        nickname:
          type: string
    DetectivesCRUDLong:
      type: object
      properties:
        returnCode:
          type: string
        reasonCode:
          type: string
        infoMessage:
          type: string
        userid:
          type: string
        nickname:
          type: string
        email:
          type: string
        createdBy:
          type: string
        createdDate:
          type: string
        updatedBy:
          type: string
        updatedDate:
          type: string
    DetectivesCRUDShort:
      type: object
      properties:
        returnCode:
          type: string
        reasonCode:
          type: string
        infoMessage:
          type: string
    SQLQueryResponse:
      type: object
      properties:
        sqlcode:
          type: number
        sqlResults:
          type: array
          items:
            type: object
            properties:
              resultLine:
                type: string
    TokenResponse:
      type: object
      properties:
        token:
          type: string
  x-ioareas:
    LCTFC100:
      fields:
        - name: USERID
          type: CHARARRAY1200
          length: 8
        - name: NICKNAME
          type: VARCHAR1200
          length: 128
    LCTFM001:
      fields:
        - name: OPCODE
          type: CHARARRAY1200
          length: 1
        - name: RETURNCODE
          type: CHARARRAY1200
          length: 02
        - name: REASONCODE
          type: CHARARRAY1200
          length: 02
        - name: INFOMESSAGE
          type: CHARARRAY1200
          length: 72
        - name: USERID
          type: CHARARRAY1200
          length: 08
        - name: NICKNAME
          type: VARCHAR1200
          length: 128
        - name: EMAIL
          type: VARCHAR1200
          length: 128
        - name: CREATEDBY
          type: CHARARRAY1200
          length: 08
        - name: CREATEDDATE
          type: CHARARRAY1200
          length: 26
        - name: UPDATEDBY
          type: CHARARRAY1200
          length: 08
        - name: UPDATEDDATE
          type: CHARARRAY1200
          length: 26
    LCTFM002:
      fields:
        - name: SQLQUERY
          type: VARCHAR037
          length: 256
        - name: SQLCODE-C
          type: CHARARRAY037
          length: 6
        - name: RESULT-LINECT
          type: UI2
          length: 2
        - name: SQLRESULTS
          type: GROUPDEPENDSON
          maxOccurs: 300
          dependsOn: RESULT-LINECT
          fields:
            - name: SQLRESLINE
              type: CHARARRAY037
              length: 80
    LWWADPLI:
      fields:
        - name: USERNAME
          type: CHARARRAY037
          length: 8
        - name: PASSWORD
          type: VARCHAR037
          length: 100
        - name: TOKEN
          type: VARCHAR037
          length: 1024