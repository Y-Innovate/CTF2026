                    - type: singleFields
                      fromName: USERID
                      toName: userid
                    - type: singleFields
                      fromName: NICKNAME
                      toName: nickname
                    - type: singleFields
                      fromName: EMAIL
                      toName: email
                    - type: singleFields
                      fromName: CREATEDBY
                      toName: createdBy
                    - type: singleFields
                      fromName: CREATEDDATE
                      toName: createdDate
                    - type: singleFields
                      fromName: UPDATEDBY
                      toName: updatedBy
